name: python-Pipeline

on:
  workflow_call:
    SONAR_TOKEN:
      required: true
    DOCKERHUB_USERNAME:
      required: true
    DOCKERHUB_TOKEN:
      required: true
##

jobs: 
  unit-tests:
    name: Running unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.in

      - name: Run Unit tests
        run: |
          mkdir -p reports/
          pytest --junitxml=reports/unit-test-results.xml --cov=basic-flask-project --cov-report=xml:reports/coverage.xml --cov-report=term-missing -v

      - name: Upload Code Coverage report
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: reports/

  codeQL:
    name: CODEQL Security Scan
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      matrix:
        language: ['python']

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "security"

  sonarqube:
    name: SonarQube Code Analysis
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Coverage Report
        uses: actions/download-artifact@v5.0.0
        with:
          name: unit-test-report
          path: reports/

      - name: Run SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v8
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.qualitygate.wait=true

  build:
    name: Docker Build Image
    runs-on: ubuntu-latest
    needs: [codeQL, sonarqube]
    if: success()
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Docker Build
        uses: docker/setup-buildx-action@v3.0.0
      
      - name: Generate Image Tags
        id: vars
        run: |
          IMAGE_TAG="${GITHUB_RUN_ID}-${GITHUB_SHA::7}"
          echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Build Image
        uses: docker/build-push-action@v5.0.0
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: my_app:${{ steps.vars.outputs.IMAGE_TAG }}

      - name: Save Docker Image
        run: docker save my_app:${{ steps.vars.outputs.IMAGE_TAG }} -o my_app.tar
      
      - name: Upload Docker Image artifact
        uses: actions/upload-artifact@v5.0.0
        with:
          name: my_app_image
          path: my_app.tar

      - name: Download the Image
        uses: actions/download-artifact@v5.0.0
        with:
          name: my_app_image
          path: .

      - name: Load Docker Image
        run: docker load -i my_app.tar

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag Image
        run: |
          docker image tag my_app:${{ steps.vars.outputs.IMAGE_TAG }} ${{ secrets.DOCKERHUB_USERNAME }}/my_app:${{ steps.vars.outputs.IMAGE_TAG }}

      - name: Push Image
        run: |
          docker image push ${{ secrets.DOCKERHUB_USERNAME }}/my_app:${{ steps.vars.outputs.IMAGE_TAG }}
              
          
  publish-ghcr:
    name: Publish Docker Image to GHCR
    runs-on: ubuntu-latest
    needs: [codeQL, sonarqube]
    if: success()
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Docker Build
        uses: docker/setup-buildx-action@v3.0.0
      
      - name: Generate Image Tags
        id: vars
        run: |
          IMAGE_TAG="${GITHUB_RUN_ID}-${GITHUB_SHA::7}"
          GHCR_IMAGE="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/my_app"
          echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "GHCR_IMAGE=$GHCR_IMAGE" >> "$GITHUB_OUTPUT"

      - name: Build Image
        uses: docker/build-push-action@v5.0.0
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: my_app:${{ steps.vars.outputs.IMAGE_TAG }}

      - name: Save Docker Image
        run: docker save my_app:${{ steps.vars.outputs.IMAGE_TAG }} -o my_app.tar
      
      - name: Upload Docker Image artifact
        uses: actions/upload-artifact@v5.0.0
        with:
          name: my_app_ghcr_image
          path: my_app.tar

      - name: Download the Image
        uses: actions/download-artifact@v5.0.0
        with:
          name: my_app_ghcr_image
          path: .

      - name: Load Docker Image
        run: docker load -i my_app.tar

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{  github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag Image
        run: |
          docker image tag my_app:${{ steps.vars.outputs.IMAGE_TAG }} ${{ steps.vars.outputs.GHCR_IMAGE }}:${{ steps.vars.outputs.IMAGE_TAG }}

      - name: Push Image
        run: |
          docker image push ${{ steps.vars.outputs.GHCR_IMAGE }}:${{ steps.vars.outputs.IMAGE_TAG }}
              
          
s